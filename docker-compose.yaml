version: '3.8'

services:
  # Servicio de la API (Cerebro)
  backend:
    build: .
    ports:
      - "8000:8000"
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000

  # Servicio del Front-end (Cara al cliente)
  frontend:
    build: .
    ports:
      - "8501:8501"
    depends_on:
      - backend
    command: python -m streamlit run app_ui.py --server.port 8501 --server.address 0.0.0.0